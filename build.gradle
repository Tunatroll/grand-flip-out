plugins {
            id 'java'
}

repositories {
            mavenLocal()
            maven { url = 'https://repo.runelite.net' }
            mavenCentral()
}

def runeLiteVersion = 'latest.release'

dependencies {
            // RuneLite client — provided at runtime, only needed for compilation
            compileOnly group: 'net.runelite', name: 'client', version: runeLiteVersion

            // Lombok for boilerplate reduction
            compileOnly 'org.projectlombok:lombok:1.18.30'
            annotationProcessor 'org.projectlombok:lombok:1.18.30'

            // Gson — used by FlipTracker for JSON serialisation of flip history
            // The RuneLite client bundles Gson, so compileOnly is sufficient
            compileOnly 'com.google.code.gson:gson:2.10.1'

            // OkHttp — bundled by RuneLite, compileOnly
            compileOnly 'com.squareup.okhttp3:okhttp:4.12.0'

            // Test dependencies
            testImplementation 'junit:junit:4.13.2'
            testImplementation group: 'net.runelite', name: 'client', version: runeLiteVersion
            testImplementation group: 'net.runelite', name: 'jshell',  version: runeLiteVersion
}

group   = 'com.fliphelper'
version = '2.1.0'

tasks.withType(JavaCompile) {
            options.encoding    = 'UTF-8'
            sourceCompatibility = JavaVersion.VERSION_11
            targetCompatibility = JavaVersion.VERSION_11
}
